name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build CLI
        run: cargo build --release --bin aegis --bin aegis-diag

      - name: Package (zip)
        shell: bash
        run: |
          mkdir -p release
          cp target/release/aegis.exe release/
          cp target/release/aegis-diag.exe release/
          cp README.md LICENSE release/ 2>/dev/null || true
          cd release && 7z a ../aegis-windows-x86_64.zip *

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Desktop MSI
        working-directory: crates/desktop
        run: |
          npm install
          npx @tauri-apps/cli build

      - name: Upload MSI
        shell: bash
        run: |
          cp crates/desktop/src-tauri/target/release/bundle/msi/*.msi aegis-desktop-x86_64.msi 2>/dev/null || echo "MSI not found"
          cp crates/desktop/src-tauri/target/release/bundle/nsis/*.exe aegis-desktop-x86_64-setup.exe 2>/dev/null || echo "NSIS not found"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            aegis-windows-x86_64.zip
            aegis-desktop-x86_64.msi
            aegis-desktop-x86_64-setup.exe
          generate_release_notes: true

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build
        run: cargo build --release --bin aegis --bin aegis-diag

      - name: Package (tar.gz)
        run: |
          mkdir -p release
          cp target/release/aegis release/
          cp target/release/aegis-diag release/
          cp README.md LICENSE release/ 2>/dev/null || true
          cd release && tar czf ../aegis-linux-x86_64.tar.gz *

      - uses: softprops/action-gh-release@v2
        with:
          files: aegis-linux-x86_64.tar.gz
          generate_release_notes: true

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build
        run: cargo build --release --bin aegis --bin aegis-diag --target ${{ matrix.target }}

      - name: Package (tar.gz)
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/aegis release/
          cp target/${{ matrix.target }}/release/aegis-diag release/
          cp README.md LICENSE release/ 2>/dev/null || true
          cd release && tar czf ../aegis-macos-${{ matrix.target }}.tar.gz *

      - uses: softprops/action-gh-release@v2
        with:
          files: aegis-macos-${{ matrix.target }}.tar.gz
          generate_release_notes: true
